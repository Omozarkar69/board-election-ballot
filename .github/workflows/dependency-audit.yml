name: Board Election Ballot · Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Generate audit report
        run: npm audit --json > npm-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: om-ozi-npm-audit-${{ github.sha }}
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 14
